  rect.c-blue  { fill: #e8f0fe; stroke: #4285f4; stroke-width: 1.5; }
  .arr    { stroke: #80868b; stroke-width: 1.5; fill: none; }
  .leader { stroke: #b0b3b8; stroke-width: 0.75; stroke-dasharray: 3 3; fill: none; }
</style>
