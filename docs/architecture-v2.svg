<svg width="100%" viewBox="0 0 680 686" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Нова архитектура: CrewAI агенти върху запазения maads scaffold</title>
<desc>CLI извиква попълнения Orchestrator (запазен скелет от scaffold: caps и loop контрол). Той пита Project Manager за Plan решение и диспечира към 5 агента през запазения seam plan(state)/act(state); телата вече се изпълняват от CrewAI (crew.py/prompts.py). Агентите ползват инструменти (PythonExec като CrewAI BaseTool, RAGRetriever за имплементация, FileIO) и пишат именувани изходи в запазения CrispDMState. Отдолу е запазената инфраструктура config.py, llm.py (token caps), data_utils.py. Цвят: зелено = запазваш scaffold-а както е; синьо = твоя работа.</desc>
