# Tasks are units of work assigned to an agent. In a sequential crew (see crew.py)
# they run top-to-bottom, and each task's output is fed to the next as context.

research_task:
  description: >
    Research the topic "{topic}". List the 5 most important facts a beginner
    should know. Be specific and avoid filler.
  expected_output: >
    A bullet list of exactly 5 key facts about {topic}.
  agent: researcher

write_task:
  description: >
    Using the researcher's facts, write a short, friendly explainer about "{topic}"
    of at most 150 words. Assume the reader knows nothing about it.
  expected_output: >
    A single paragraph (max 150 words) explaining {topic} in plain language.
  agent: writer
